<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OllamaBot Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <span class="eyebrow">Sessions</span>
          <button id="newSessionBtn" class="ghost-button" type="button">+ New</button>
        </div>
        <div id="sessionList" class="session-list"></div>
        <button id="toggleSidebar" class="sidebar-toggle" type="button" title="Toggle sessions">☰</button>
      </aside>
      <main class="app" id="mainApp">
        <header class="topbar">
        <div>
          <p class="eyebrow">OllamaBot</p>
          <h1 id="activeModel">Select a model</h1>
        </div>
        <div class="actions">
          <button id="openSettings" class="ghost-button" type="button">Settings</button>
          <button id="openModels" class="primary-button" type="button">Models</button>
        </div>
      </header>

      <section class="status-strip">
        <span id="baseUrl">Ollama</span>
        <span id="version">version</span>
        <span id="memoryState">memory</span>
        <span id="cacheState">live</span>
      </section>

      <section id="capabilityBar" class="capability-bar"></section>

      <section id="contextBar" class="context-bar" title="Estimated context usage">
        <div class="context-track">
          <div class="context-fill" id="contextFill"></div>
        </div>
        <span id="contextLabel">0%</span>
      </section>

      <section id="messages" class="messages"></section>

      <section id="attachments" class="attachments"></section>

      <form id="chatForm" class="composer">
        <div class="composer-tools">
          <label id="imageControl" class="tool-button">
            Image
            <input id="imageInput" type="file" accept="image/*" multiple />
          </label>
          <label id="audioControl" class="tool-button">
            Audio
            <input id="audioInput" type="file" accept="audio/*,.wav,.mp3,.ogg,.m4a,.flac" multiple />
          </label>
          <button id="recordControl" class="tool-button recording-btn" type="button" hidden>
            <span class="record-icon">🎤</span> <span class="record-label">Record</span>
          </button>
          <label id="thinkControl" class="think-toggle">
            <input id="thinkToggle" type="checkbox" checked />
            <span>think</span>
          </label>
        </div>
        <textarea id="prompt" rows="3" placeholder="Message the selected model. Paste images/audio or attach files when supported."></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
    </div>

    <dialog id="modelsDialog" class="modal">
      <form method="dialog" class="modal-head">
        <div>
          <p class="eyebrow">Available models</p>
          <h2>Choose main model</h2>
        </div>
        <button class="ghost-button" value="close">Close</button>
      </form>
      <div id="modelsBody" class="model-list"></div>
    </dialog>

    <dialog id="settingsDialog" class="modal compact">
      <form method="dialog" class="modal-head">
        <div>
          <p class="eyebrow">Runtime</p>
          <h2>Ollama settings</h2>
        </div>
        <button class="ghost-button" value="close">Close</button>
      </form>
      <form id="settingsForm" class="settings-form">
        <label>
          Ollama URL
          <input id="ollamaUrl" type="url" placeholder="http://localhost:11434" />
        </label>
        <label>
          Workspace path
          <input id="workspacePath" type="text" placeholder="workspace" />
        </label>
        <label>
          Sessions path
          <input id="sessionsPath" type="text" placeholder="sessions" />
        </label>
        <label>
          Memory path
          <input id="memoryPath" type="text" placeholder="memory" />
        </label>
        <label>
          Default Microphone
          <select id="micSelect">
            <option value="">Default system microphone</option>
          </select>
        </label>
        <label class="think-toggle">
          <input id="webSearchToggle" type="checkbox" />
          <span>Web search</span>
        </label>
        <label class="think-toggle">
          <input id="webExposeToggle" type="checkbox" />
          <span>Exponer a la red</span>
        </label>
        <button class="primary-button" type="submit">Save and reload models</button>
      </form>
    </dialog>

    <dialog id="imageDialog" class="image-modal">
      <div class="image-modal-head">
        <span class="eyebrow">Preview</span>
        <button id="imageDialogClose" class="ghost-button" type="button">Close</button>
      </div>
      <div class="image-modal-body">
        <img id="imageDialogImg" src="" alt="Full preview" />
      </div>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
